name: fyp_phase1
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  get: ^4.7.2

  # Firebase
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.3.0

  # UI & Utility
  google_fonts: ^6.3.2
  image_picker: ^1.2.1
  cupertino_icons: ^1.0.8
  cloudinary_flutter: ^1.3.0
  http: ^1.6.0
  geolocator: ^14.0.2
  intl: ^0.20.2

  # Environment
  flutter_dotenv: ^6.0.1

  # AI
  google_generative_ai: ^0.2.2

  # Image Optimization
  cached_network_image: ^3.4.1

  # UX
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4

  # Storage & Tools
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.2
  image: ^4.8.0
  tflite_flutter: ^0.12.1
  path: ^1.9.1
  connectivity_plus: ^7.1.1
  google_sign_in: ^6.2.2
  uuid: ^4.5.3
  sqflite: ^2.3.3
  firebase_app_check: 0.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1   # ✅ ONLY here

# ✅ MUST BE OUTSIDE dependencies
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/models/crop_recommendation/
    - assets/models/disease_detection/